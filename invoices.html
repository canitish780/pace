<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shani Traders — Invoice History</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@500;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF8F2; --ink:#1B2430; --ledger-red:#9E2B25; --brass:#B08D57;
    --slate:#5B6577; --line:#D8D2C4; --panel:#FFFFFF; --ok:#2E6B4F; --danger:#B23A34;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;background:var(--paper);color:var(--ink);}
  header{
    background:var(--ink);color:var(--paper);padding:18px 28px;
    display:flex;align-items:center;justify-content:space-between;border-bottom:4px solid var(--ledger-red);
  }
  header h1{font-family:'Roboto Slab',serif;font-size:1.3rem;margin:0;}
  .config-btn{
    background:transparent;border:1px solid var(--brass);color:var(--brass);padding:6px 12px;
    border-radius:4px;font-size:.8rem;cursor:pointer;font-family:'Inter',sans-serif;text-decoration:none;display:inline-block;
  }
  .config-btn:hover{background:var(--brass);color:var(--ink);}

  .wrap{max-width:820px;margin:0 auto;padding:20px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px 20px;margin-bottom:16px;}
  .card h2{font-family:'Roboto Slab',serif;font-size:1rem;margin:0 0 12px 0;border-bottom:2px solid var(--ledger-red);padding-bottom:8px;}

  .search-field{margin-bottom:14px;}
  .search-field input{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;font-size:.95rem;
    font-family:'Inter',sans-serif;
  }

  table.inv-list{width:100%;border-collapse:collapse;font-size:.9rem;}
  table.inv-list th{
    text-align:left;background:#F2EEE3;color:var(--slate);font-size:.68rem;text-transform:uppercase;
    letter-spacing:.3px;padding:9px 8px;border-bottom:1px solid var(--line);
  }
  table.inv-list td{padding:10px 8px;border-bottom:1px solid var(--line);}
  table.inv-list tr.data-row{cursor:pointer;transition:background .1s;}
  table.inv-list tr.data-row:hover{background:#F7F3EA;}
  table.inv-list td.inv-no{font-family:'IBM Plex Mono',monospace;color:var(--ledger-red);font-weight:600;}
  .empty-msg{color:var(--slate);font-size:.85rem;padding:14px 4px;}
  .status-msg{font-size:.8rem;margin-top:8px;font-family:'IBM Plex Mono',monospace;color:var(--slate);}
  .status-msg.err{color:var(--danger);}

  /* ---- Detail popup ---- */
  dialog#detailDialog{
    border:none;border-radius:10px;padding:0;max-width:520px;width:92%;
  }
  dialog#detailDialog::backdrop{background:rgba(27,36,48,.6);}
  .detail-head{
    background:var(--ink);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;
  }
  .detail-head .inv-title{font-family:'Roboto Slab',serif;font-size:1.05rem;}
  .detail-head .inv-title span{color:var(--brass);font-family:'IBM Plex Mono',monospace;font-size:.95rem;}
  .detail-close{background:none;border:none;color:#fff;font-size:1.3rem;cursor:pointer;line-height:1;opacity:.8;}
  .detail-close:hover{opacity:1;}
  .detail-body{padding:18px 20px;max-height:70vh;overflow-y:auto;}
  .detail-section{margin-bottom:16px;}
  .detail-section h3{
    font-size:.68rem;text-transform:uppercase;letter-spacing:.4px;color:var(--brass);
    font-weight:700;margin:0 0 8px 0;
  }
  .detail-row{display:flex;justify-content:space-between;padding:4px 0;font-size:.88rem;gap:12px;}
  .detail-row span:first-child{color:var(--slate);}
  .detail-row span:last-child{text-align:right;font-weight:500;}
  .detail-row.grand{
    border-top:2px solid var(--ink);margin-top:6px;padding-top:8px;
    font-family:'IBM Plex Mono',monospace;font-size:1.15rem;font-weight:700;color:var(--ledger-red);
  }
  .items-list{font-size:.85rem;line-height:1.7;color:var(--ink);background:#F2EEE3;border-radius:6px;padding:10px 12px;}

  @media (max-width:640px){
    .wrap{padding:12px;}
    header{padding:12px 14px;}
    header h1{font-size:1rem;}
    table.inv-list thead{display:none;}
    table.inv-list, table.inv-list tbody, table.inv-list tr, table.inv-list td{display:block;width:100%;}
    table.inv-list tr.data-row{
      border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:10px;background:#FEFDFB;
    }
    table.inv-list td{border:none;padding:2px 0;}
    table.inv-list td.inv-no{font-size:1rem;}
    table.inv-list td.inv-buyer{font-size:.85rem;color:var(--ink);}
    table.inv-list td.inv-date{font-size:.75rem;color:var(--slate);}
  }
</style>
</head>
<body>

<header>
  <h1>SHANI TRADERS — Invoice History</h1>
  <a class="config-btn" href="invoice-billing.html">← Back to Billing</a>
</header>

<div class="wrap">
  <div class="card">
    <h2>Saved Invoices</h2>
    <div class="search-field">
      <input id="searchBox" placeholder="Search by invoice no. or buyer name…" oninput="renderList()">
    </div>
    <table class="inv-list">
      <thead><tr><th>Invoice No</th><th>Date</th><th>Buyer Name</th></tr></thead>
      <tbody id="listBody"><tr><td colspan="3" class="empty-msg">Loading…</td></tr></tbody>
    </table>
    <div id="statusMsg" class="status-msg"></div>
  </div>
</div>

<dialog id="detailDialog">
  <div class="detail-head">
    <div class="inv-title">Invoice <span id="dInvNo"></span></div>
    <button class="detail-close" onclick="detailDialog.close()">✕</button>
  </div>
  <div class="detail-body">
    <div class="detail-section">
      <h3>Invoice</h3>
      <div class="detail-row"><span>Date</span><span id="dDate"></span></div>
      <div class="detail-row"><span>Time</span><span id="dTime"></span></div>
    </div>
    <div class="detail-section">
      <h3>Buyer</h3>
      <div class="detail-row"><span>Name</span><span id="dName"></span></div>
      <div class="detail-row"><span>Mobile</span><span id="dMobile"></span></div>
      <div class="detail-row"><span>Address</span><span id="dAddress"></span></div>
      <div class="detail-row"><span>GSTIN</span><span id="dGSTIN"></span></div>
    </div>
    <div class="detail-section">
      <h3>Items Sold</h3>
      <div class="items-list" id="dItems"></div>
    </div>
    <div class="detail-section">
      <h3>Amounts</h3>
      <div class="detail-row"><span>Taxable Value</span><span id="dTaxable"></span></div>
      <div class="detail-row"><span>CGST</span><span id="dCgst"></span></div>
      <div class="detail-row"><span>SGST</span><span id="dSgst"></span></div>
      <div class="detail-row"><span>IGST</span><span id="dIgst"></span></div>
      <div class="detail-row grand"><span>TOTAL</span><span id="dTotal"></span></div>
    </div>
  </div>
</dialog>

<script>
/* Same locked config as the other pages */
const CONFIG = {
  scriptUrl: "https://script.google.com/macros/s/AKfycbw0XU2o_knZz8sgta_wgpHcfeTOe16ux0HhqK0AHRpmlGSXqETTCoeGXNKdHELTQzcUfA/exec"
};

let INVOICES = [];

function escapeHtml(s){ return (s||'').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function money(n){ return '₹ ' + (Number(n)||0).toFixed(2); }

async function loadInvoices(){
  statusMsg.textContent = 'Loading from Google Sheet…';
  statusMsg.className = 'status-msg';
  try{
    const res = await fetch(CONFIG.scriptUrl + '?action=invoices');
    const data = await res.json();
    INVOICES = data.invoices || [];
    statusMsg.textContent = '';
    renderList();
  }catch(err){
    statusMsg.textContent = 'Could not reach Google Sheet — check your connection and reload.';
    statusMsg.className = 'status-msg err';
    listBody.innerHTML = '<tr><td colspan="3" class="empty-msg">Unable to load invoices.</td></tr>';
  }
}

function renderList(){
  const q = searchBox.value.trim().toLowerCase();
  const rows = INVOICES.filter(inv =>
    !q || inv.invoiceNo.toLowerCase().includes(q) || (inv.buyerName||'').toLowerCase().includes(q)
  );
  if(!rows.length){
    listBody.innerHTML = `<tr><td colspan="3" class="empty-msg">${INVOICES.length ? 'No invoices match your search.' : 'No invoices saved yet.'}</td></tr>`;
    return;
  }
  listBody.innerHTML = rows.map((inv, i) => `
    <tr class="data-row" onclick="showDetail('${inv.invoiceNo}')">
      <td class="inv-no" data-label="Invoice No">${escapeHtml(inv.invoiceNo)}</td>
      <td class="inv-date" data-label="Date">${escapeHtml(inv.date)}</td>
      <td class="inv-buyer" data-label="Buyer Name">${escapeHtml(inv.buyerName)}</td>
    </tr>`).join('');
}

function showDetail(invoiceNo){
  const inv = INVOICES.find(i => i.invoiceNo === invoiceNo);
  if(!inv) return;
  dInvNo.textContent = inv.invoiceNo;
  dDate.textContent = inv.date || '—';
  dTime.textContent = inv.time || '—';
  dName.textContent = inv.buyerName || '—';
  dMobile.textContent = inv.mobile || '—';
  dAddress.textContent = inv.address || '—';
  dGSTIN.textContent = inv.gstin || '—';
  dItems.textContent = inv.items || '—';
  dTaxable.textContent = money(inv.taxable);
  dCgst.textContent = money(inv.cgst);
  dSgst.textContent = money(inv.sgst);
  dIgst.textContent = money(inv.igst);
  dTotal.textContent = money(inv.total);
  detailDialog.showModal();
}

window.addEventListener('DOMContentLoaded', loadInvoices);
</script>
</body>
</html>
